<!-- Affichage de la vue Accès techniques -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graph'AD - Accès Techniques</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 40px);
            box-sizing: border-box;
        }

        .layout-left,
        .layout-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .panel-list {
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            padding: 10px;
        }
    </style>
    <!-- Déchiffrement du JSON -->
    <script src="../js/crypto.js"></script>
    <script>
        if (!GraphADCrypto.isAuthenticated()) {
            window.location.replace("../home.html");
        }
    </script>
    <!-- Appel des autres scripts -->
    <script src="../js/shared-menu.js"></script>
    <script src="../ux/IntroCard.js"></script>
    <script src="../ux/PedagogyCard.js"></script>
    <script src="../ux/Legend.js"></script>
    <script src="../ux/DiagnosticCard.js"></script>
    <script src="../ux/ActionList.js"></script>

    <script src="../js/utils.js"></script>
    <script src="../ux/SidePanel.js"></script>

    <script src="../ux/TechAccessView.js"></script>
</head>

<body>
<!-- Bouton de retour au tableau de bord -->
<a href="../index.html" style="
    display: inline-block;
    padding: 8px 16px;
    margin: 10px 20px;
    background: #f0f4ff;
    border: 1px solid #aac2ff;
    border-radius: 6px;
    color: #4A90D9;
    text-decoration: none;
    font-size: 14px;
">← Retour au tableau de bord</a>

<!-- Définition des layouts -->
<div class="layout">

    <!-- Colonne de gauche : Introduction à la vue, indications d'utilisation et légende -->
    <div class="layout-left">
        <section id="intro-card"></section>
        <section id="pedagogy-card"></section>
        <section id="legend"></section>
    </div>

    <!-- Colonne centrale : vue scindée en deux tableaux -->
    <!-- Tableau de gauche : filtre + liste des groupes -->
    <div style="display:flex; flex-direction:column; overflow:hidden;
            border:1px solid #ddd; border-radius:6px; background:#fff;">

        <!-- Barre de filtre (unique) -->
        <div style="padding:8px 10px; border-bottom:1px solid #eee; background:#f9fafb; flex-shrink:0;">
            <div style="display:flex; align-items:center; gap:0;">
                <input type="text" id="tech-filter-input"
                    placeholder="Filtrer par groupe ou collaborateur..."
                    style="flex:1; padding:7px 10px; border:1px solid #ddd;
                        border-right:none; border-radius:6px 0 0 6px;
                        font-size:13px; outline:none;">
                <button id="tech-filter-btn"
                    style="padding:7px 12px; background:#4A90D9; color:white; border:none;
                        border-radius:0 6px 6px 0; font-size:15px; cursor:pointer;">→</button>
            </div>
            <div id="tech-filter-count"
                 style="font-size:11px; color:#9ca3af; margin-top:4px; display:none;">
            </div>
        </div>

        <!-- Résultats de filtre — visible uniquement quand filtre actif -->
        <div id="tech-filter-results"
            style="display:none; max-height:180px; overflow-y:auto;
                    border-bottom:1px solid #eee; background:#fff; font-size:13px;">
        </div>

        <!-- Liste des groupes — filtrée en temps réel -->
        <div class="panel-list" id="tech-groups"
             style="border:none; border-radius:0; flex:1; overflow-y:auto;"></div>
    </div>

    <!-- Tableau de droite : Liste des membres -->
    <div class="panel-list" id="tech-members">
        <p style="color:#999;">Cliquez sur un groupe pour voir ses membres.</p>
    </div>

    <!-- Colonne de droite : points d'attention et actions recommandés -->
    <div class="layout-right">
        <section id="diagnostic-card"></section>
        <section id="action-list"></section>
    </div>

</div>

<div id="side-panel"></div> <!-- Panneau latéral d'information -->
<!-- Note : ici, le panneau latéral sert de fallback. Sinon, toutes les informations s'affichent directement dans le tableau de droite. -->

<script>
    // --- Introduction à la vue ---
    IntroCard.render({
        title: "Accès techniques",
        subtitle: "Groupes techniques et comptes de service",
        text: "Cette vue présente les groupes techniques et les comptes qui détiennent des droits d'accès. "
            + "Les comptes de service sont signalés par un badge spécifique."
    });

    // --- Indications d'utilisation ---
    PedagogyCard.render({
        text: "Un groupe technique représente un droit d'accès (serveur, dossier sensible, application). "
            + "Les membres sont les comptes qui bénéficient de ce droit."
    });

    // --- Légende ---
    Legend.render([
        { color: "#EF4444", label: "Critique (admins domaine)" },
        { color: "#F59E0B", label: "À privilèges" },
        { color: "#10B981", label: "Standard" }
    ]);

    // --- Chargement du JSON chiffré : On garanti un déchiffrement en temps réel ---
    loadActiveFile()
        .then(json => {

            // Initialisation des groupes techniques et comptes admins et de service
            // Note : exclusion des invités. Ce sont des objets à part entière de l'Active Directory
            const groups = (json.technical.groups || []).filter(g =>
                normStr(g.label) !== "invites" && normStr(g.label) !== "guests"
            );
            const allAccounts = (json.business.identities || []).filter(a =>
                normStr(a.label) !== "invite" && normStr(a.label) !== "guest"
            );
            const serviceAccounts = allAccounts.filter(a => a.meta?.isServiceAccount);

            TechAccessView.render("tech-groups", groups, allAccounts);


            // =====================================================================
            // SECTION RODC (krbtgt_xxxxx)
            // 
            // Ces comptes sont des comptes de service Kerberos pour les RODC.
            // Ils n'appartiennent à aucun groupe — on les regroupe dans un
            // conteneur synthétique affiché en bas de la liste des groupes.
            // =====================================================================
            const rodcAccounts = allAccounts.filter(a =>
                (a.label || "").toLowerCase().startsWith("krbtgt_")
            );

            if (rodcAccounts.length > 0) {
                const container = document.getElementById("tech-groups");

                // Séparateur visuel
                const separator = document.createElement("div");
                separator.style.cssText = "margin-top:16px; border-top:2px dashed #E0E7FF; padding-top:12px;";

                // Titre du conteneur
                const title = document.createElement("div");
                title.style.cssText = "font-size:13px; color:#4338CA; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px;";
                title.innerHTML = `🔑 ${rodcAccounts.length} compte(s) Kerberos RODC`;
                separator.appendChild(title);

                // Sous-titre explicatif
                const subtitle = document.createElement("div");
                subtitle.style.cssText = "font-size:12px; color:#6b7280; margin-bottom:10px;";
                subtitle.textContent = "Services Kerberos dédiés aux contrôleurs de domaine en lecture seule (RODC). Ces comptes ne doivent appartenir à aucun groupe.";
                separator.appendChild(subtitle);

                // Un item par compte krbtgt_xxxxx
                rodcAccounts.forEach(acc => {
                    const item = document.createElement("div");
                    item.className = "technical-group-item";
                    item.setAttribute("data-node-id", acc.id);
                    item.style.borderLeft = "3px solid #4338CA";
                    item.style.cursor = "pointer";

                    const pwdLastSet = acc.meta?.passwordLastSet
                        ? formatDateTime(acc.meta.passwordLastSet)
                        : "Jamais modifié";

                    item.innerHTML = `
                        <span class="risk-dot ok"></span>
                        <div style="flex:1;">
                            <div class="group-title">${escapeHtml(acc.label)}</div>
                            <div class="group-meta">
                                Compte Kerberos RODC
                            </div>
                        </div>
                        <span style="background:#EDE9FE; color:#4338CA; font-size:10px;
                            font-weight:600; padding:1px 7px; border-radius:10px;">
                            Kerberos RODC
                        </span>
                    `;

                    item.addEventListener("click", () => {
                        // Ouvre la fiche dans le tableau de droite
                        if (typeof showServiceAccountCardInline === "function") {
                            showServiceAccountCardInline(acc);
                        } else {
                            SidePanel.open(acc);
                        }
                    });

                    separator.appendChild(item);
                });

                container.appendChild(separator);
            }
            // ── Fin section RODC ─────────────────────────────────────────

            // =====================================================================================
            // FILTRE TEMPS RÉEL — Accès techniques
            //
            // Mode groupe  : tape un nom de groupe → seuls les groupes correspondants restent
            // Mode compte  : tape un nom de compte de service → seuls ses groupes parents restent
            // Champ vide   → tous les groupes réapparaissent
            // =====================================================================================
            const filterInput = document.getElementById("tech-filter-input");
            const filterCount = document.getElementById("tech-filter-count");
            document.getElementById("tech-filter-btn")
                .addEventListener("click", applyTechFilter);

            // Fonction du filtre en temps réel
            function applyTechFilter() {
                const q = normStr(filterInput.value.trim());
                const resultsBox = document.getElementById("tech-filter-results");

                // On attend 2 caractères pour afficher les résultats
                if (!q || q.length < 2) {
                    resultsBox.style.display = "none";
                    resultsBox.innerHTML = "";
                    TechAccessView.render("tech-groups", groups, allAccounts);
                    filterCount.style.display = "none";
                    return;
                }

                // Groupe dont le nom correspond
                const matchedGroups = groups.filter(g => normStr(g.label).includes(q));

                // La recherche par utilisateur garde les groupes auxquel il correspond
                const matchedAccountGroupIds = new Set();
                serviceAccounts.forEach(a => {
                    if (!normStr(a.label).includes(q) &&
                        !normStr(a.meta?.description || "").includes(q)) return;
                    groups.forEach(g => {
                        if ((g.meta?.members || []).includes(a.id))
                            matchedAccountGroupIds.add(g.id);
                    });
                });

                // Les correspondances directes et indirectes sont conservés dans la recherche
                // On les renvoie ensuite
                const combinedIds = new Set([
                    ...matchedGroups.map(g => g.id),
                    ...matchedAccountGroupIds
                ]);
                const filteredGroups = groups.filter(g => combinedIds.has(g.id));

                TechAccessView.render("tech-groups", filteredGroups, allAccounts);

                // Mise à jour de l'interface utilisateur :
                // - Affichage des groupes filtrés
                // - Nombre de résultats trouvés
                // - Aucun résultat : on informe
                filterCount.textContent = filteredGroups.length > 0
                    ? `${filteredGroups.length} résultat(s) — vider le champ pour tout réafficher`
                    : "Aucun résultat";
                filterCount.style.display = "block";

                // On rend la mise à jour de l'interface ensuite
                resultsBox.innerHTML = "";
                if (filteredGroups.length === 0) {
                    resultsBox.innerHTML = `<div style="padding:8px 12px; color:#9ca3af;">Aucun résultat</div>`;
                } else {
                    resultsBox.innerHTML = "";

                // Comptes dont le nom correspond directement à la saisie
                // Comptes de service uniquement (isServiceAccount === true dans le JSON)
                const matchedAccounts = serviceAccounts.filter(a =>
                    normStr(a.label).includes(q) ||
                    normStr(a.meta?.description || "").includes(q)
                );

                // Rien ne correspond dans la recherche -> aucun résultat
                if (filteredGroups.length === 0 && matchedAccounts.length === 0) {
                    resultsBox.innerHTML = `<div style="padding:8px 12px; color:#9ca3af;">Aucun résultat</div>`;
                } else {
                    // Sinon, on affiche les comptes en premier
                    matchedAccounts.slice(0, 8).forEach(acc => {
                        // On en profite pour déterminer le type de compte
                        const hasSPN = Array.isArray(acc.meta?.servicePrincipalName)
                            ? acc.meta.servicePrincipalName.length > 0
                            : !!acc.meta?.servicePrincipalName;
                        const badgeLabel  = hasSPN ? "Service" : "Compte";
                        const badgeBg     = hasSPN ? "#EDE9FE" : "#FEF3C7";
                        const badgeColor  = hasSPN ? "#7C3AED" : "#92400E";

                        // Balise pour chaque compte selon le type (Service ou Compte)
                        const item = document.createElement("div");
                        item.style.cssText = "padding:7px 12px; cursor:pointer; border-bottom:1px solid #f5f5f5; display:flex; align-items:center; gap:8px;";
                        item.innerHTML = `
                            <span style="background:${badgeBg}; color:${badgeColor}; font-size:10px;
                                font-weight:600; padding:1px 5px; border-radius:8px; white-space:nowrap;">
                                ${escapeHtml(badgeLabel)}
                            </span>
                            <span style="font-size:13px; color:#1f2937;">${escapeHtml(acc.label)}</span>
                        `;
                        // Evénement de survol de souris
                        item.addEventListener("mouseenter", () => item.style.background = "#f5f7fa");
                        item.addEventListener("mouseleave", () => item.style.background = "#fff");
                        // Au clic, affiche les détails d'un compte
                        item.addEventListener("click", () => {
                            // Trouver le groupe parent pour l'afficher dans le panneau central
                            const parentGroup = filteredGroups.find(g =>
                                (g.meta?.members || []).includes(acc.id)
                            ) || groups.find(g =>
                                (g.meta?.members || []).includes(acc.id)
                            );
                            // Actualisation du tableau de droite si le clic à lieu sur un groupe
                            // Le groupe sélectionné est ainsi mis en évidence
                            if (parentGroup) {
                                window.currentTechGroup = parentGroup;
                                TechAccessView.renderMembers("tech-members", parentGroup);
                                document.querySelectorAll("[data-node-id]").forEach(el =>
                                    el.style.background = el.dataset.nodeId === parentGroup.id ? "#EFF6FF" : "");
                            }
                            // Sinon, on affiche les informations de l'administrateur ou du compte de service
                            if (typeof showServiceAccountCardInline === "function")
                                showServiceAccountCardInline(acc);
                            // Le clic sur un résultat masque la liste déroulante et réinitialise le champ de recherche
                            resultsBox.style.display = "none";
                            filterInput.value = "";
                            filterCount.style.display = "none";
                        });
                        resultsBox.appendChild(item);
                    });

                    // Séparateur si les deux sections sont présentes
                    if (filteredGroups.length > 0 && matchedAccounts.length > 0) {
                        const sep = document.createElement("div");
                        sep.style.cssText = "padding:3px 12px; font-size:10px; text-transform:uppercase; color:#9ca3af; font-weight:600; background:#f9fafb;";
                        sep.textContent = "Groupes";
                        resultsBox.appendChild(sep);
                    }

                    // Après la recherche par utilisateur, la recherche par groupe intervient ensuite
                    filteredGroups.forEach(g => {
                        // Création de l'élément de groupe et insertion dans l'affichage
                        const item = document.createElement("div");
                        item.style.cssText = "padding:7px 12px; cursor:pointer; border-bottom:1px solid #f5f5f5;";
                        item.innerHTML = `
                            <span style="background:#E0E7FF; color:#3730A3; font-size:10px;
                                font-weight:600; padding:1px 5px; border-radius:8px; margin-right:6px;">
                                Groupe
                            </span>
                            ${escapeHtml(g.label)}
                        `;
                        // Evénement de survol de souris
                        item.addEventListener("mouseenter", () => item.style.background = "#f5f7fa");
                        item.addEventListener("mouseleave", () => item.style.background = "#fff");
                        // Au clic, afficher les membres du groupe
                        item.addEventListener("click", () => {
                            window.currentTechGroup = g;
                            TechAccessView.renderMembers("tech-members", g);
                            document.querySelectorAll("[data-node-id]").forEach(el =>
                                el.style.background = el.dataset.nodeId === g.id ? "#EFF6FF" : "");
                            // Le clic sur un résultat masque la liste déroulante et réinitialise le champ de recherche
                            resultsBox.style.display = "none";
                            filterInput.value = "";
                            filterCount.style.display = "none";
                        });
                        resultsBox.appendChild(item);
                    });
                }}
                resultsBox.style.display = "block";
            }

            filterInput.addEventListener("input", applyTechFilter); // Application du filtre

            // Diagnostic et actions recommandées
            const issues  = [];
            const actions = [];

            // Anomalie 1 : le mot de passe n'expire jamais
            const pwdNeverExpires = serviceAccounts.filter(a => a.meta?.passwordNeverExpires);
            if (pwdNeverExpires.length > 0) {
                issues.push({ level: "warning", text: `${pwdNeverExpires.length} compte(s) de service avec mot de passe permanent` });
                actions.push({ priority: "high", text: "Modifier les mots de passe permanents" });
            }

            // Anomalie 2 : le groupe est vide
            const emptyGroups = groups.filter(g =>
                !g.meta?.members || g.meta.members.length === 0
            );
            if (emptyGroups.length > 0) {
                issues.push({ level: "warning", text: `${emptyGroups.length} groupe(s) technique(s) vide(s)` });
                actions.push({ priority: "medium", text: "Supprimer ou documenter les groupes vides" });
            }

            // On rend les cartes
            DiagnosticCard.render({ issues });
            ActionList.render(actions);

            // Navigation depuis la barre de recherche dashboard
            const searchTarget = sessionStorage.getItem("graphad-search-target");
            if (searchTarget) {
                sessionStorage.removeItem("graphad-search-target");
                const target = JSON.parse(searchTarget);

                // La cible est destiné à cette vue : plusieurs cas de figure
                if (target?.view === "tech-access") {
                    setTimeout(() => {

                        // --- Cas groupe technique (admin ou standard) ---
                        // On affiche la liste des membres de ce groupe
                        if (target.type === "techGroup") {
                            const group = groups.find(g => g.id === target.id || g.label === target.label);
                            if (group) {
                                if (!document.querySelector(`[data-node-id="${group.id}"]`)) {
                                    const btn = document.querySelector("#tech-groups .show-more-btn");
                                    if (btn) btn.click();
                                }
                                setTimeout(() => {
                                    highlightNodeById(group.id);
                                    window.currentTechGroup = group;
                                    TechAccessView.renderMembers("tech-members", group);
                                }, 80);
                            }
                            return;
                        }

                        // --- Cas compte de service ou admin ---
                        // On affiche les détails de l'utilisateur sur le tableau de droite
                        if (target.type === "serviceAccount") {
                            // Ouvrir le groupe parent s'il existe
                            if (target.parentGroupId) {
                                const pGroup = groups.find(g => g.id === target.parentGroupId);
                                if (pGroup) {
                                    if (!document.querySelector(`[data-node-id="${pGroup.id}"]`)) {
                                        const btn = document.querySelector("#tech-groups .show-more-btn");
                                        if (btn) btn.click();
                                    }
                                    setTimeout(() => {
                                        highlightNodeById(pGroup.id);
                                        window.currentTechGroup = pGroup;
                                        TechAccessView.renderMembers("tech-members", pGroup);
                                    }, 80);
                                }
                            }
                             // Note : highlightNodeById() est une fonction utilitaire qui permet la mise en surbrillance du résultat

                            // Afficher la fiche du compte
                            const acc = allAccounts.find(a => a.id === target.id || a.label === target.label);
                            if (acc) {
                                setTimeout(() => {
                                    if (typeof showServiceAccountCardInline === "function")
                                        showServiceAccountCardInline(acc);
                                }, target.parentGroupId ? 400 : 150);
                            }
                        }

                    }, 300); // Timeout de 300 milisecondes pour la recherche
                }
            }
            
            // =======================================================================
            // FICHE UTILISATEUR INLINE
            // Elle permet d'afficher les détails d'un compte de service sur le
            // tableau de droite directement
            // La fiche est fermable par ailleurs pour revenir à la vue liste
            // Si cette fonction plante, le panneau latéral vient en fallback
            // =======================================================================
            window.showServiceAccountCardInline = function(acc) {
                const container = document.getElementById("tech-members");
                if (!container) return;

                // Identité du compte
                const accName    = (acc.label || "").toLowerCase();
                const isKrbtgt  = accName.startsWith("krbtgt_");  // ← RODC Kerberos
                const isService = isKrbtgt                         // ← krbtgt_xxxxx = service par définition
                                || (acc.meta?.servicePrincipalName || []).length > 0
                                || typeof acc.meta?.servicePrincipalName === "string";

                // Badge de statut
                const statusColors = { active:"#10B981", inactive:"#F59E0B", disabled:"#EF4444" };
                const statusLabels = { active:"Actif", inactive:"Inactif", disabled:"Désactivé" };
                const statusColor  = statusColors[acc.meta?.status] || "#9CA3AF";
                const statusLabel  = statusLabels[acc.meta?.status] || "Inconnu";

                // Description s'il existe
                const description = acc.meta?.description || "";
                const spnList = Array.isArray(acc.meta?.servicePrincipalName)
                    ? acc.meta.servicePrincipalName.filter(Boolean)
                    : (acc.meta?.servicePrincipalName ? [acc.meta.servicePrincipalName] : []);

                // Mot de passe jamais modifié : informer
                const pwdLastSet = acc.meta?.passwordLastSet
                    ? formatDateTime(acc.meta.passwordLastSet)
                    : "Jamais modifié";

                // Points d'attention
                const alerts = [];
                if (acc.meta?.passwordNeverExpires) alerts.push("⚠ Mot de passe permanent");

                if (isService) {
                    // Comptes de service : "Jamais connecté" est normal, on surveille l'activation
                    if (acc.meta?.enabled === false) {
                        alerts.push("Compte désactivé mais actif selon les services. Si vous remarquez l'absence du badge « Désactivé », il s'agit d'une anomalie à signaler.");
                    } else {
                        // Sinon, on signale l'anomalie
                        alerts.push("⚠ Compte activé. Or, ce compte n'est utilisé que par les services et non pour des connexions humaines.");
                    }
                } else {
                    // Comptes non-service : alertes standard
                    if (acc.meta?.enabled === false) alerts.push("⚠ Compte désactivé");
                    if (!acc.meta?.lastLogon)        alerts.push("⚠ Jamais connecté");
                }

                container.innerHTML = "";
                container.style.display = "block";
                container.style.overflowY = "auto";

                // En-tête — construit entièrement en DOM pour éviter les problèmes de querySelector
                const accHeader = document.createElement("div");
                accHeader.style.cssText = "display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;";

                // Colonne de gauche : nom du compte
                const accHeaderLeft = document.createElement("div");
                accHeaderLeft.innerHTML = `<div style="font-size:18px; font-weight:700; color:#1f2937;">${escapeHtml(acc.label)}</div>`;

                // Colonne droite : badge statut / service + bouton Fermer
                const accHeaderRight = document.createElement("div");
                accHeaderRight.style.cssText = "display:flex; flex-direction:column; align-items:flex-end; gap:4px;";
                accHeaderRight.innerHTML = `
                    <span style="background:${statusColor}22; color:${statusColor}; font-size:11px;
                                font-weight:600; padding:3px 8px; border-radius:20px; border:1px solid ${statusColor}44;">
                        ${statusLabel}
                    </span>
                    ${isService ? `<span style="background:#EDE9FE; color:#7C3AED; font-size:11px;
                                font-weight:600; padding:3px 8px; border-radius:20px; border:1px solid #C4B5FD44;">
                        Service
                    </span>` : ""}
                `;

                // Bouton fermer : permet de fermer la présentation de l'utilisateur
                const accCloseBtn = document.createElement("button");
                accCloseBtn.textContent = "✕ Fermer";
                accCloseBtn.style.cssText = `font-size:11px; padding:3px 10px; border-radius:6px; cursor:pointer;
                    background:#f0f4ff; border:1px solid #aac2ff; color:#4A90D9; font-weight:600;`
                    ;
                accCloseBtn.addEventListener("click", () => {
                    const groupToRestore = window.currentTechGroup;
                    setTimeout(() => {
                        // Si on vient d'un groupe, on réaffichage la liste correspondante à ce dernier
                        if (groupToRestore) {
                            TechAccessView.renderMembers("tech-members", groupToRestore);
                        } else {
                            document.getElementById("tech-members").innerHTML =
                                "<p style='color:#9ca3af;'>Cliquez sur un groupe pour voir ses membres.</p>";
                        }
                    }, 0);
                });
                accHeaderRight.appendChild(accCloseBtn);

                accHeader.appendChild(accHeaderLeft);
                accHeader.appendChild(accHeaderRight);
                container.appendChild(accHeader);

                // Cette fonction utilise une fonction helper pour éviter innerHTML +=
                // qui détruirait, par exemple, les listeners du bouton Fermer
                function addBlock(html) {
                    const tmp = document.createElement("div");
                    tmp.innerHTML = html;
                    while (tmp.firstChild) container.appendChild(tmp.firstChild);
                }

                // Injections dynamiques de contenu
                // Section Rôle / description
                if (description) addBlock(`
                    <div style="font-size:11px; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:4px;">Rôle / Description</div>
                    <div style="font-size:13px; color:#374151; background:#f9fafb; padding:7px 10px;
                                border-radius:6px; margin-bottom:12px;">${escapeHtml(description)}</div>
                `);

                // Position dans la structure — depuis le DN
                const dn = acc.meta?.dn || "";
                const location = dn.split(",")
                    .filter(p => p.trim().startsWith("OU="))
                    .map(p => p.trim().replace("OU=", ""))
                    .reverse()
                    .join(" › ");

                if (location) {
                    const locBlock = document.createElement("div");
                    locBlock.style.marginBottom = "12px";
                    locBlock.innerHTML = `
                        <div style="font-size:11px; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:4px;">Position dans la structure</div>
                        <div style="font-size:12px; color:#374151; background:#f9fafb; padding:7px 10px; border-radius:6px; border-left:3px solid #4A90D9;">
                            ${escapeHtml(location)}
                        </div>
                    `;
                    container.appendChild(locBlock);
                }

                // Services connexes (SPN)
                if (spnList.length > 0) addBlock(`
                    <div style="font-size:11px; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:4px;">Services liés</div>
                    <div style="font-family:monospace; font-size:12px; color:#374151; margin-bottom:12px; word-break:break-all;">
                        ${spnList.map(escapeHtml).join("<br>")}
                    </div>
                `);

                // Dernière modification du mot de passe
                addBlock(`
                    <div style="font-size:11px; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:4px;">Dernier changement de mot de passe</div>
                    <div style="font-size:13px; color:#374151; margin-bottom:12px;">${pwdLastSet}</div>
                `);

                // Boîte d'alerte si c'est le cas
                if (alerts.length > 0) {
                    addBlock(`<div style="font-size:11px; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:4px;">Points d'attention</div>`);
                    alerts.forEach(a => {
                        addBlock(`
                            <div style="font-size:13px; color:#B45309; background:#FFFBEB;
                                padding:6px 10px; border-radius:6px; margin-bottom:4px;
                                border-left:3px solid #F59E0B;">${escapeHtml(a)}</div>
                        `);
                    });
                }

                // Bouton "Voir dans Infrastructure" — si le compte a un DN
                if (location) {
                    const infraBtn = document.createElement("button");
                    infraBtn.textContent = "Voir la position dans la vue Infrastructure →";
                    infraBtn.style.cssText = `
                        margin-top:12px; width:100%; padding:8px 12px;
                        background:#f0f4ff; border:1px solid #aac2ff; border-radius:6px;
                        color:#4A90D9; font-size:13px; font-weight:600; cursor:pointer; text-align:left;
                    `;
                    infraBtn.addEventListener("click", () => {
                        const ouDN = dn.split(",").slice(1).join(",");
                        // Chercher l'OU parente dans le JSON — on la passera via sessionStorage
                        sessionStorage.setItem("graphad-search-target", JSON.stringify({
                            id:    null,
                            label: location || acc.label,
                            view:  "infrastructure",
                            ouDN:  ouDN
                        }));
                        window.location.href = "infrastructure.html";
                    });
                    container.appendChild(infraBtn);
                }
            };
        })
		// Capture des erreurs en cas d'échec de déchiffrement
        // La session active est nettoyé et on revient à la page d'accueil
        .catch(err => {
            console.error("[Graph'AD] Erreur de chargement :", err);
            sessionStorage.removeItem("_gad_active_file");
            GraphADCrypto.clear();
            window.location.replace("../home.html");
        });
</script>

</body>
</html>
